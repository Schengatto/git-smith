<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://www.gravatar.com;" />
    <title>GitSmith</title>
  </head>
  <body>
    <div id="splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #141420; color: #cdd4eb; font-family: system-ui, sans-serif;
    ">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#93bbff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
      <p style="margin-top: 16px; font-size: 14px; opacity: 0.7;">Loading GitSmith…</p>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
