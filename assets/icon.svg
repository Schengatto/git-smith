<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="#1e1e2e"/>
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="#313150" stroke-width="1.5"/>

  <!-- Circular arc connecting the commits (like a ring/orbit) -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#313150" stroke-width="6" opacity="0.5"/>

  <!-- Connection lines between adjacent commit dots (on the ring) -->
  <!-- 8 commits evenly spaced at 45° intervals, starting from top -->
  <!-- Arcs between commits following the circle -->
  <path d="M 256 106 A 150 150 0 0 1 362 150" stroke="#89b4fa" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 362 150 A 150 150 0 0 1 406 256" stroke="#a6e3a1" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 406 256 A 150 150 0 0 1 362 362" stroke="#cba6f7" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 362 362 A 150 150 0 0 1 256 406" stroke="#f9e2af" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 256 406 A 150 150 0 0 1 150 362" stroke="#89b4fa" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 150 362 A 150 150 0 0 1 106 256" stroke="#a6e3a1" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 106 256 A 150 150 0 0 1 150 150" stroke="#fab387" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 150 150 A 150 150 0 0 1 256 106" stroke="#cba6f7" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Commit dots around the circle -->
  <circle cx="256" cy="106" r="14" fill="#89b4fa" filter="url(#glow-sm)"/>
  <circle cx="362" cy="150" r="12" fill="#a6e3a1" filter="url(#glow-sm)"/>
  <circle cx="406" cy="256" r="14" fill="#cba6f7" filter="url(#glow-sm)"/>
  <circle cx="362" cy="362" r="12" fill="#f9e2af" filter="url(#glow-sm)"/>
  <circle cx="256" cy="406" r="14" fill="#89b4fa" filter="url(#glow-sm)"/>
  <circle cx="150" cy="362" r="12" fill="#a6e3a1" filter="url(#glow-sm)"/>
  <circle cx="106" cy="256" r="14" fill="#fab387" filter="url(#glow-sm)"/>
  <circle cx="150" cy="150" r="12" fill="#cba6f7" filter="url(#glow-sm)"/>

  <!-- "G" letter in the center -->
  <text
    x="256" y="316"
    text-anchor="middle"
    fill="#e0e4f7"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="180"
    font-weight="800"
    letter-spacing="-5"
  >G</text>
</svg>
