name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  release:
    name: Build & Release (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Rename artifacts and generate update manifests
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          mkdir -p out/release

          generate_yml() {
            local FILE="$1" YML_NAME="$2"
            local SIZE SHA
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
            SHA=$(sha512sum "$FILE" 2>/dev/null | awk '{print $1}' || shasum -a 512 "$FILE" | awk '{print $1}')
            SHA_B64=$(echo -n "$SHA" | xxd -r -p | base64 -w0 2>/dev/null || echo -n "$SHA" | xxd -r -p | base64)
            local NAME
            NAME=$(basename "$FILE")
            cat > "out/release/${YML_NAME}" <<EOYML
          version: ${VERSION}
          files:
            - url: ${NAME}
              sha512: ${SHA_B64}
              size: ${SIZE}
          path: ${NAME}
          sha512: ${SHA_B64}
          releaseDate: '${RELEASE_DATE}'
          EOYML
          }

          # Windows
          for f in out/make/wix/x64/*.msi; do
            if [ -f "$f" ]; then
              DEST="out/release/GitSmith-${VERSION}-Windows-x64-Setup.msi"
              cp "$f" "$DEST"
              generate_yml "$DEST" "latest.yml"
            fi
          done
          for f in out/make/zip/win32/x64/*.zip; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Windows-x64-Portable.zip"
          done

          # macOS
          for f in out/make/zip/darwin/**/*.zip; do
            if [ -f "$f" ]; then
              DEST="out/release/GitSmith-${VERSION}-macOS-arm64.zip"
              cp "$f" "$DEST"
              generate_yml "$DEST" "latest-mac.yml"
            fi
          done

          # Linux
          for f in out/make/deb/x64/*.deb; do
            if [ -f "$f" ]; then
              DEST="out/release/GitSmith-${VERSION}-Linux-x64.deb"
              cp "$f" "$DEST"
              generate_yml "$DEST" "latest-linux.yml"
            fi
          done
          for f in out/make/rpm/x64/*.rpm; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Linux-x64.rpm"
          done

          ls -la out/release/ || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.name }}
          path: out/release/*
          retention-days: 1

  virustotal-scan:
    name: VirusTotal Scan
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-Windows
          path: ./artifacts

      - name: Upload to VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./artifacts/*.msi

      - name: Poll results and check threshold
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        shell: bash
        run: |
          THRESHOLD=3
          POLL_INTERVAL=15
          MAX_POLLS=20

          echo "## VirusTotal Scan Results" > vt-report.md
          echo "" >> vt-report.md
          echo "| File | Result | Report |" >> vt-report.md
          echo "|------|--------|--------|" >> vt-report.md

          # Parse analysis output — comma-separated "file=analysisURL" pairs
          while IFS= read -r ENTRY; do
            if [ -z "$ENTRY" ]; then continue; fi

            FILE_PATH="${ENTRY%%=*}"
            ANALYSIS_URL="${ENTRY#*=}"
            if [ -z "$ANALYSIS_URL" ] || [ -z "$FILE_PATH" ]; then continue; fi

            ANALYSIS_ID="${ANALYSIS_URL##*/}"
            FILENAME=$(basename "$FILE_PATH")

            echo "Polling analysis for $FILENAME (ID: $ANALYSIS_ID)..."

            for i in $(seq 1 $MAX_POLLS); do
              sleep "$POLL_INTERVAL"

              RESPONSE=$(curl -sf -H "x-apikey: $VT_API_KEY" \
                "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID") || {
                echo "  WARNING: curl failed for $FILENAME (poll $i), retrying..."
                continue
              }

              STATUS=$(echo "$RESPONSE" | jq -r '.data.attributes.status')

              if [ "$STATUS" = "completed" ]; then
                MALICIOUS=$(echo "$RESPONSE" | jq -r '.data.attributes.stats.malicious')
                TOTAL=$(echo "$RESPONSE" | jq '[.data.attributes.stats | to_entries[].value] | add')
                SHA256=$(echo "$RESPONSE" | jq -r '.meta.file_info.sha256')
                PERMALINK="https://www.virustotal.com/gui/file/$SHA256"

                echo "| $FILENAME | $MALICIOUS/$TOTAL | [View]($PERMALINK) |" >> vt-report.md
                echo "DONE: $FILENAME — $MALICIOUS detections"
                break
              fi

              if [ "$i" -eq "$MAX_POLLS" ]; then
                echo "| $FILENAME | Pending | [View]($ANALYSIS_URL) |" >> vt-report.md
                echo "TIMEOUT: scan still in progress, continuing anyway"
                break
              fi

              echo "  Poll $i/$MAX_POLLS: status=$STATUS, retrying..."
            done
          done < <(echo "$VT_ANALYSIS" | tr ',' '\n')

          cat vt-report.md

      - name: Upload VirusTotal report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-report
          path: vt-report.md
          retention-days: 90

  publish-release:
    name: Publish Release
    needs: [release, virustotal-scan]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: ./artifacts

      - name: Download VirusTotal report
        uses: actions/download-artifact@v4
        with:
          name: virustotal-report
          path: ./report
        continue-on-error: true

      - name: Build release body
        shell: bash
        run: |
          if [ -f ./report/vt-report.md ]; then
            cp ./report/vt-report.md release-body.md
          else
            echo "VirusTotal scan results not available." > release-body.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          draft: true
          generate_release_notes: true
          body_path: release-body.md
