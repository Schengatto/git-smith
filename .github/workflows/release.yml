name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  release:
    name: Build & Release (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Rename artifacts and generate update manifests
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          mkdir -p out/release

          generate_yml() {
            local FILE="$1" YML_NAME="$2"
            local SIZE SHA
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
            SHA=$(sha512sum "$FILE" 2>/dev/null | awk '{print $1}' || shasum -a 512 "$FILE" | awk '{print $1}')
            SHA_B64=$(echo -n "$SHA" | xxd -r -p | base64 -w0 2>/dev/null || echo -n "$SHA" | xxd -r -p | base64)
            local NAME
            NAME=$(basename "$FILE")
            cat > "out/release/${YML_NAME}" <<EOYML
          version: ${VERSION}
          files:
            - url: ${NAME}
              sha512: ${SHA_B64}
              size: ${SIZE}
          path: ${NAME}
          sha512: ${SHA_B64}
          releaseDate: '${RELEASE_DATE}'
          EOYML
          }

          # Windows
          for f in out/make/wix/x64/*.msi; do
            if [ -f "$f" ]; then
              DEST="out/release/GitSmith-${VERSION}-Windows-x64-Setup.msi"
              cp "$f" "$DEST"
              generate_yml "$DEST" "latest.yml"
            fi
          done
          for f in out/make/zip/win32/x64/*.zip; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Windows-x64-Portable.zip"
          done

          # macOS
          for f in out/make/zip/darwin/**/*.zip; do
            if [ -f "$f" ]; then
              DEST="out/release/GitSmith-${VERSION}-macOS-arm64.zip"
              cp "$f" "$DEST"
              generate_yml "$DEST" "latest-mac.yml"
            fi
          done

          # Linux
          for f in out/make/deb/x64/*.deb; do
            if [ -f "$f" ]; then
              DEST="out/release/GitSmith-${VERSION}-Linux-x64.deb"
              cp "$f" "$DEST"
              generate_yml "$DEST" "latest-linux.yml"
            fi
          done
          for f in out/make/rpm/x64/*.rpm; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Linux-x64.rpm"
          done

          ls -la out/release/ || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.name }}
          path: out/release/*
          retention-days: 1

  virustotal-scan:
    name: VirusTotal Scan
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Upload to VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./artifacts/*.msi
            ./artifacts/*.zip
            ./artifacts/*.deb
            ./artifacts/*.rpm

      - name: Poll results and check threshold
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        shell: bash
        run: |
          THRESHOLD=3
          POLL_INTERVAL=20
          MAX_POLLS=30
          FAILED=0

          echo "## VirusTotal Scan Results" > vt-report.md
          echo "" >> vt-report.md
          echo "| File | Result | Report |" >> vt-report.md
          echo "|------|--------|--------|" >> vt-report.md

          # Parse analysis output — JSON object mapping glob/file to analysis URL
          # Each value looks like: https://www.virustotal.com/gui/file-analysis/{id}
          # NOTE: uses process substitution (< <(...)) instead of pipe to avoid
          # subshell — variable assignments (FAILED) must survive the loop.
          while read -r FILE_PATTERN ANALYSIS_URL; do
            # Skip empty or null entries (glob matched no files on this OS)
            if [ -z "$ANALYSIS_URL" ] || [ "$ANALYSIS_URL" = "null" ]; then continue; fi

            # Extract analysis ID from URL (last path segment)
            ANALYSIS_ID="${ANALYSIS_URL##*/}"
            FILENAME=$(basename "$FILE_PATTERN")

            echo "Polling analysis for $FILENAME (ID: $ANALYSIS_ID)..."

            # Poll until completed (sleep before each request to respect rate limit)
            for i in $(seq 1 $MAX_POLLS); do
              sleep "$POLL_INTERVAL"

              RESPONSE=$(curl -sf -H "x-apikey: $VT_API_KEY" \
                "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID") || {
                echo "  WARNING: curl failed for $FILENAME (poll $i), retrying..."
                continue
              }

              STATUS=$(echo "$RESPONSE" | jq -r '.data.attributes.status')

              if [ "$STATUS" = "completed" ]; then
                MALICIOUS=$(echo "$RESPONSE" | jq -r '.data.attributes.stats.malicious')
                TOTAL=$(echo "$RESPONSE" | jq '[.data.attributes.stats | to_entries[].value] | add')
                SHA256=$(echo "$RESPONSE" | jq -r '.meta.file_info.sha256')

                PERMALINK="https://www.virustotal.com/gui/file/$SHA256"

                if [ "$MALICIOUS" -ge "$THRESHOLD" ]; then
                  echo "| $FILENAME | $MALICIOUS/$TOTAL | [View]($PERMALINK) |" >> vt-report.md
                  echo "FAIL: $FILENAME has $MALICIOUS detections (threshold: $THRESHOLD)"
                  FAILED=1
                else
                  echo "| $FILENAME | $MALICIOUS/$TOTAL | [View]($PERMALINK) |" >> vt-report.md
                  echo "PASS: $FILENAME has $MALICIOUS detections"
                fi
                break
              fi

              if [ "$i" -eq "$MAX_POLLS" ]; then
                echo "TIMEOUT: Analysis for $FILENAME did not complete in time"
                echo "| $FILENAME | TIMEOUT | N/A |" >> vt-report.md
                FAILED=1
                break
              fi

              echo "  Poll $i/$MAX_POLLS: status=$STATUS, retrying..."
            done
          done < <(echo "$VT_ANALYSIS" | jq -r 'to_entries[] | "\(.key) \(.value)"')

          echo ""
          echo "=== VirusTotal Report ==="
          cat vt-report.md

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more files exceeded the detection threshold or timed out."
            exit 1
          fi

      - name: Upload VirusTotal report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-report
          path: vt-report.md
          retention-days: 90

  publish-release:
    name: Publish Release
    needs: virustotal-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: ./artifacts

      - name: Download VirusTotal report
        uses: actions/download-artifact@v4
        with:
          name: virustotal-report
          path: ./report

      - name: Build release body
        shell: bash
        run: cp ./report/vt-report.md release-body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          draft: true
          generate_release_notes: true
          body_path: release-body.md
