name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  release:
    name: Build & Release (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Rename artifacts with OS and version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out/release

          # Windows
          for f in out/make/wix/x64/*.msi; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Windows-x64-Setup.msi"
          done
          for f in out/make/zip/win32/x64/*.zip; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Windows-x64-Portable.zip"
          done

          # macOS
          for f in out/make/zip/darwin/**/*.zip; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-macOS-arm64.zip"
          done

          # Linux
          for f in out/make/deb/x64/*.deb; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Linux-x64.deb"
          done
          for f in out/make/rpm/x64/*.rpm; do
            [ -f "$f" ] && cp "$f" "out/release/GitSmith-${VERSION}-Linux-x64.rpm"
          done

          ls -la out/release/ || true

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: out/release/*
          draft: true
          generate_release_notes: true
