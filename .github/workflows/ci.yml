name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build Installers
    needs: [lint-and-typecheck, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux
          - os: windows-latest
            artifact-name: windows
          - os: macos-latest
            artifact-name: macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Upload Linux installers (.deb, .rpm)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: git-expansion-linux
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
          retention-days: 14

      - name: Upload Windows installer (.exe)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: git-expansion-windows
          path: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
          retention-days: 14

      - name: Upload macOS archive (.zip)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: git-expansion-macos
          path: out/make/zip/**/*.zip
          retention-days: 14
